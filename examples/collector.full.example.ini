# Full watchersattherim collector config - every option (values here are examples,
# not defaults). A bare config runs a local collector with sensible defaults.

[collector]
http_api = true             # read-only HTTP query API (default: false)
bind = 127.0.0.1
http_port = 9000

[storage]
dir = ~/.watchersattherim/collector
# database = /var/lib/watchersattherim/collector.db   # default: <dir>/collector.db
retention_days = 30

[allowlist]
mode = explicit             # explicit | open
# Comma- or newline-separated hex LXMF addresses of allowed monitors:
allowed =
    aabbccddeeff00112233445566778899
    99887766554433221100ffeeddccbbaa

[admin]
# LXMF addresses allowed to send admin commands (e.g. from Sideband):
# status, monitors, allow <hash>, deny <hash>, block <hash>, ...
allowed =
    00112233445566778899aabbccddeeff

[ingest]
reject_older_than = 12h
reject_future_skew = 2m

[stats]
refresh_interval = 2m

[maintenance]
hour = 4                    # local hour (0-23) to run daily retention + VACUUM

[propagation]
enabled = true             # expose the propagation queries (channel/trend/map/coverage)
default_timezone = UTC     # hour-of-day bucketing for trend/anomaly when not set per query
max_radius_km = 5000       # cap on map/coverage radius
max_cells = 2000           # cap on cells in a map/coverage response
max_window = 90d           # cap on query lookback (protects the shared DB)

[reticulum]
# config_dir = ~/.reticulum
