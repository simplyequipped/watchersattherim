# Full watchersattherim collector config. Every option is optional with a sensible
# default - a bare config runs a local collector. Lines below are commented at their
# default; uncomment and edit what you need. Add your monitors to the allowlist
# (here, or live with `watr-collector --allow <hash>`).

[collector]
# http_api = false           # read-only HTTP query API
# bind = 0.0.0.0             # HTTP bind address (when http_api = true)
# http_port = 8080

[storage]
# dir = ~/.watchersattherim/collector
# database = /var/lib/watchersattherim/collector.db   # default: <dir>/collector.db
# retention_days = 90

[allowlist]
mode = explicit             # explicit (allowlisted monitors only) | open (any)
# Hex LXMF addresses of allowed monitors (comma- or newline-separated):
# allowed =
#     aabbccddeeff00112233445566778899
#     99887766554433221100ffeeddccbbaa

[admin]
# LXMF addresses allowed to send admin commands (status, allow/deny/block, ...):
# allowed =
#     00112233445566778899aabbccddeeff

[ingest]
# reject_older_than = 24h
# reject_future_skew = 5m

[stats]
# refresh_interval = 1m

[maintenance]
# hour = 3                   # local hour (0-23) for daily retention + VACUUM

[propagation]
# enabled = true             # expose the propagation queries (channel/trend/map/coverage)
# default_timezone = UTC     # hour-of-day bucketing for trend/anomaly when not set per query
# max_radius_km = 5000       # cap on map/coverage radius
# max_cells = 2000           # cap on cells in a map/coverage response
# max_window = 90d           # cap on query lookback (protects the shared DB)

[reticulum]
# config_dir = ~/.reticulum
