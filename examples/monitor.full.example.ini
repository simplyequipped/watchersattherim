# Full watchersattherim monitor config. Required options are active, optional ones
# are commented out showing their default. Copy this, set your grid, a receiver, and
# the collector address, then uncomment anything you want to change.
# (`./install.sh monitor --config` copies this and fills in the binary paths.)

[monitor]
grid = FN19              # your Maidenhead grid (required)
# lat = 49.51            # default: grid center
# lon = -77.02           # default: grid center
# debug = false          # true = verbose: raw -v decode firehose + full subprocess commands at startup

[ft8mon]
# path = ft8mon          # default: found on PATH

[wsprmon]
# path = wsprmon         # default: found on PATH
# wsprd_path = wsprd     # default: unset (wsprmon finds wsprd itself)

# Each [receiver:NAME] is one receiver process. NAME is a unique id.
#   mode    = ft8 (default) | wspr     band defaults to NAME, set it to override
#   enabled = true (default) | false   keep a section configured but not running
# Give exactly one source:
#   card  = N[:CH]      audio device (radio tuned externally)
#   path  = file.wav    a WAV file
#   input = airspy|sdrip|hpsdr|cloudsdr   an SDR the decoder opens directly (one
#                                         decoder owns it, can't be shared)
#   sdr   = true        a channel off the shared SDR in [sdr] (lets several
#                       receivers share one radio, see [sdr] below)
# This file enables one receiver. The rest are a disabled menu, toggle 'enabled'.

# Audio device, FT8. Radio tuned externally to freq. "8:1" picks channel 1 (default 0).
# Per-receiver options (any source/mode):
#   min_decode_snr       drop decodes below this SNR (default: -25 ft8, -30 wspr)
#   restart_after_silent restart this receiver after this much silence (default: off)
#   distance_snr_threshold_km / _mi   drop decodes too strong for their distance
#                        (fabricated birdies), as distance:snr pairs (default: off)
[receiver:20m]
enabled = true
mode = ft8
band = 20m
freq = 14074000          # Hz (required)
card = 8:1
# min_decode_snr = -25
# restart_after_silent = 5m
# distance_snr_threshold_km = 13000:-15     # or several: 9000:15, 13000:-15, 16000:-20

# Same sound card on the 20m WSPR dial. A radio does one mode at a time, so
# this is an alternative to 20m FT8 (enable one), a second radio could run both.
[receiver:20m-wspr]
enabled = false
mode    = wspr
band    = 20m
freq    = 14095600
card    = 8:1

# RFspace SDR-IP / NetSDR / CloudIQ (also: hpsdr, cloudsdr), needs ip. A direct
# SDR is owned exclusively by its one decoder.
[receiver:40m]
enabled = false
mode    = ft8
band    = 40m
freq    = 7074000
input   = sdrip
ip      = 192.168.3.100

# Airspy HF+, serial optional (omit for the default device).
[receiver:30m]
enabled = false
mode    = ft8
band    = 30m
freq    = 10136000
input   = airspy
serial  = AB12CD34
# args  = -only 1500      # optional, appended raw to the receiver command

# Shared SDR: one radio fanned out to several receivers (using sdrfanout). Each receiver
# below includes sdr = true and gives its dial freq. This example runs FT8 + WSPR on
# one band off a single SDR.
[sdr]
# driver  = hackrf          # SoapySDR device name, default: first device
# gain    = auto            # dB, or auto (AGC / device default)
# rate    = auto            # Hz, auto = smallest integer x 12k spanning the channels
# center  = auto            # Hz, auto = lowest dial minus guard
# guard   = 10000           # guard band below lowest channel
# ppm     = 0               # frequency correction (no-op on some devices like HackRF)
# antenna =                # Soapy antenna name, default: device default
# buffer  = 1               # per-channel output buffer, seconds
# path    = sdrfanout       # the sdrfanout binary path
# runtime_dir =            # where channel FIFOs are made, default: <storage.dir>/run

[receiver:40m-ft8-sdr]
enabled = false
mode    = ft8
band    = 40m
freq    = 7074000
sdr     = true

[receiver:40m-wspr-sdr]
enabled = false
mode    = wspr
band    = 40m
freq    = 7038600
sdr     = true

[observations]
# callsigns = false      # store tx/rx callsigns in telemetry
# indirect  = true        # emit indirect observations (needs cache.enabled)

[cache]
# enabled = true
# max_entries = 10000
# ttl = 2h               # accepts 7200, 120m, 4h, 1d
# persist = false        # cache db under storage.dir, false = memory only

# Drop bogus decodes (birdies, known false grids) before they become observations.
# All keys optional, empty by default. Matches are global. A freq is the absolute RF
# frequency (dial + audio offset), so an entry only affects the band it lands in.
[blacklist]
# grids     = AA00                         # transmitter grids, exact, case-insensitive
# callsigns = N0CALL                       # transmitter callsigns, exact, case-insensitive
# freqs     = 7075123, 14074500-14074520   # RF Hz: single values (+/-10 Hz) or lo-hi ranges

[collector]
address = abc123def456   # the collector's LXMF address (required)
# send_interval = 120    # seconds between batches
# delivery = direct      # direct | propagated
# propagation_node = fedcba987654   # required when delivery = propagated
# max_pending_observations = 50000
# send_empty_batches = false   # send batches even with no observations

[reticulum]
# config_dir = ~/.reticulum   # default: Reticulum's own default

[storage]
# dir = ~/.watchersattherim   # identity + cache db location
