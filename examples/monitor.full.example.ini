# Full watchersattherim monitor config - every option, with non-default values.
# Required: [monitor] grid, one or more [receiver:NAME], [collector] address.

[monitor]
grid = FN19
lat = 49.51              # optional; overrides grid-center latitude
lon = -77.02             # optional; overrides grid-center longitude

[ft8mon]
path = /usr/local/bin/ft8mon

# Each [receiver:NAME] is one ft8mon process; NAME is the band.
# Exactly one of: card (audio device), path (WAV file), input (SDR).

# Audio device: radio tuned externally to freq. "8:1" picks channel 1 (default 0).
[receiver:20m]
freq = 14074000          # Hz
card = 8:1

# RFspace SDR-IP / NetSDR / CloudIQ (also: hpsdr, cloudsdr) - needs ip.
[receiver:40m]
freq = 7074000
input = sdrip
ip = 192.168.3.100

# Airspy HF+ - serial optional (omit for the default device).
[receiver:30m]
freq = 10136000
input = airspy
serial = AB12CD34
# args = -only 1500      # optional, appended raw to the ft8mon command

[observations]
callsigns = true         # store tx/rx callsigns in telemetry
indirect = false         # emit indirect observations (needs cache.enabled)

[cache]
enabled = true
max_entries = 20000
ttl = 4h                 # accepts 7200, 120m, 4h, 1d
persist = true           # cache db under storage.dir; false = memory only

[collector]
address = abc123def456
send_interval = 120
delivery = propagated    # direct | propagated
propagation_node = fedcba987654
max_pending_observations = 25000

[reticulum]
config_dir = ~/.reticulum

[storage]
dir = /var/lib/watchersattherim
