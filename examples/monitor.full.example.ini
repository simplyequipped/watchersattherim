# Full watchersattherim monitor config. Required options are active, optional ones
# are commented out showing their default. Copy this, set your grid, a receiver, and
# the collector address, then uncomment anything you want to change.
# (`./install.sh monitor --config` copies this and fills in the binary paths.)

[monitor]
grid = FN19              # maidenhead grid (required)
# lat = 49.51            # default: [monitor] grid center
# lon = -77.02           # default: [monitor] grid center
# debug = false          # true = verbose sdtout (subprocess start commmands and unfiltered decodes)
# working_dir =          # scratch dir for wsprmon wavs and sdrfanout fifos, defaults to /dev/shm (tmpfs)
#                          or *[storage] dir* if /dev/shm is not available/accessible

[collector]
address = abc123def456   # the collector's LXMF address (required)
# send_interval = 120    # seconds between batches
# delivery = direct      # direct | propagated
# propagation_node = fedcba987654   # required when delivery = propagated
# max_pending_observations = 50000
# send_empty_batches = false   # send batches even with no observations

[ft8mon]
# path = ft8mon          # default: found on PATH

[wsprmon]
# path = wsprmon         # default: found on PATH
# wsprd_path = wsprd     # default: unset (wsprmon finds wsprd itself)
# working_dir =          # where wsprmon writes wav files, default: [monitor] working_dir

[reticulum]
# config_dir = ~/.reticulum   # default: Reticulum's own default

[storage]
# dir = ~/.watchersattherim   # identity + cache db location

[observations]
# callsigns = false       # store tx/rx callsigns in telemetry
# indirect  = true        # store indirect observations (requires *[cache] enabled = true*)

[cache]
# enabled = true
# max_entries = 10000
# ttl = 2h               # accepts 7200, 120m, 4h, 1d
# persist = false        # cache db under storage.dir, false = memory only

[blacklist]
# grids     = AA00                         # transmitter grids, exact, case-insensitive, default: none
# callsigns = N0CALL                       # transmitter callsigns, exact, case-insensitive, default: none
# freqs     = 7075123, 14074500-14074520   # absolute RF frequency in Hz, single values (+/-10 Hz) or lo-hi ranges, default: none

# -----------------------------------------------------------------------------------------------------
# Each [receiver:NAME] is one receiver process where NAME is expected to be unique
# Typical receiver options:
#   enabled = true       true or false, default: true
#   mode    = ft8        ft8 or wspr, default: ft8
#   band    = band       default: NAME, example: 40m
#   freq    = 7074000    dial frequency in Hz, required (transceiver to be tuned externally)
#
# Specify only one of the following receiver sources:
#   card    = DESC[:CH]  audio device where DESC is a string to match to the device description
#                        from `ft8mon -list` or `wsprmon -list`, CH default: 0, example: QMX
#   card    = CARD[:CH]  audio device, CARD number from `ft8mon -list` or `wsprmon -list`,
#                        CH default: 0, example: 8:1
#   path    = file.wav   use wav file as input source
#   input   = airspy     an SDR the ft8mon or wsprmon decoder opens directly (not shared), options:
#                        airspy, sdrip, hpsdr, cloudsdr
#   serial  =            serial device path, defaults to ft8mon/wsprmon default device selection
#   sdr     = true       multiple receivers share one SDR radio via sdrfanout streams, see [sdr] below
#
# Additional receiver options:
#   ip                        =   IP address for input sources: sdrip, hpsdr, cloudsdr
#   min_decode_snr            =   drop decodes below this SNR, default: -25 for ft8, -30 for wspr
#   restart_after_silent =        restart this receiver after no decodes for a time period, example: 5m
#   distance_snr_threshold_km =   drop fabricated decodes too strong for their distance, comma separated
#                                 pairs, example: 13000:-15, 16000:-20
#   distance_snr_threshold_mi =   same as distance_snr_threshold_km, units convereted to km internally
# -----------------------------------------------------------------------------------------------------

# Audio device matching description "QMX"
# Note: transceiver must be tuned to freq manually
[receiver:20m]
enabled = true
mode = ft8
band = 20m
freq = 14074000
card = QMX

# Shared SDR: one SDR radio fanned out to support multiple receivers via sdrfanout
# This example runs FT8 and WSPR on the 40m band from a single SDR
[sdr]
driver  = hackrf            # SoapySDR device name, default: first enumerated SoapySDR device,
#                           # common options: hackrf, rtlsdr, airspy, airspyhf, sdrplay, lime
# gain    = auto            # dB, or auto (AGC or device default, may be a no-op on some devices)
# rate    = auto            # SDR bandwidth in Hz, auto = smallest multiple of 12kHz spanning configured receivers
# center  = auto            # SDR frequency in Hz, auto = centered amidst the channels
# guard   = 10000           # guard band in Hz, around center (DC) as well as outer channel edges
# ppm     = 0               # frequency correction (no-op on some devices like HackRF)
# antenna =                 # Soapy antenna name, default: device default
# buffer  = 1               # per-channel output buffer, seconds
# path    = sdrfanout       # the sdrfanout binary path
# working_dir =             # where channel FIFOs are made, default: [monitor] working_dir

[receiver:40m-ft8-sdr]
enabled = false
mode    = ft8
band    = 40m
freq    = 7074000
sdr     = true

[receiver:40m-wspr-sdr]
enabled = false
mode    = wspr
band    = 40m
freq    = 7038600
sdr     = true

